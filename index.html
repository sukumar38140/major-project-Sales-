<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Service</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2>Submit Your Project</h2>

  <form id="projectForm">

    <input type="text" id="fullName" placeholder="Full Name" required>
    <input type="text" id="college" placeholder="College Name" required>
    <input type="text" id="rollNo" placeholder="Roll Number" required>

    <input type="tel" id="whatsapp" placeholder="WhatsApp Number" required>

    <input type="text" id="projectTitle" placeholder="Project Title" required>

    <select id="projectType" required>
      <option value="">Project Type</option>
      <option>Mini Project</option>
      <option>Major Project</option>
    </select>

    <select id="domain" required>
      <option value="">Domain</option>
      <option>Web Development</option>
      <option>Python</option>
      <option>AI/ML</option>
    </select>

    <textarea id="projectDesc" placeholder="Project Description"></textarea>

    <label class="terms">
      <input type="checkbox" id="termsCheckbox">
      Accept Terms & Conditions
    </label>

    <button type="submit" class="btn submit-btn">
      Submit & Chat on WhatsApp
    </button>

    <button type="button" class="btn pay-btn" id="payAdvanceBtn">
      Pay ₹199 Advance
    </button>

    <p class="note">⚠️ Payment is required to start your project</p>

  </form>

</div>

<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
